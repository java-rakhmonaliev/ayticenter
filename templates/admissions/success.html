{% extends 'base.html' %}
{% load static %}

{% block title %}Ariza qabul qilindi — IT Center Yaypan{% endblock %}

{% block content %}
<section class="section">
  <div class="container-main">
    <div class="max-w-md mx-auto text-center py-12">

      <!-- Check mark -->
      <div class="w-16 h-16 bg-accent/10 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg class="w-8 h-8 text-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
      </div>

      <h1 class="text-2xl md:text-3xl font-extrabold text-base-dark tracking-tight mb-3">
        Ariza qabul qilindi
      </h1>

      <p class="text-muted text-base mb-8 leading-relaxed">
        Tez orada siz bilan aloqaga chiqamiz. Odatda 1 ish kuni ichida javob beramiz.
      </p>

      <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
        <a href="{% url 'core:home' %}" class="btn-primary">
          Bosh sahifaga qaytish
        </a>
        <a href="{% url 'courses:list' %}" class="btn-ghost">
          Kurslarni ko'rish
        </a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
