{% extends 'base.html' %}
{% load static %}

{% block title %}Ariza qabul qilindi — IT Center Yaypan{% endblock %}

{% block content %}
<section class="relative overflow-hidden text-center" style="padding:190px 0 140px;">
  <div class="ambient-orb" style="top:80px; left:50%; transform:translateX(-50%); width:600px; height:400px; border-radius:0; background:radial-gradient(ellipse, rgba(43,229,123,0.14), transparent 65%);"></div>

  <div class="mx-auto relative" style="max-width:560px; padding:0 clamp(1rem,4vw,2rem);">

    <!-- Check mark -->
    <div class="spring-in inline-flex items-center justify-center"
         style="width:108px; height:108px; border-radius:50%; background:rgba(43,229,123,0.12); border:2px solid var(--accent); color:var(--accent); font-size:44px; font-weight:900; box-shadow:0 24px 90px rgba(43,229,123,0.35);">✓</div>

    <div class="mono-label" style="letter-spacing:0.3em; color:var(--accent); margin-top:30px;">Status · Qabul qilindi</div>

    <h1 class="reveal" style="margin:14px 0 0; font-stretch:116%; font-size:clamp(38px,5.5vw,72px); line-height:0.94;">
      Ariza qabul<br>qilindi!
    </h1>

    <p class="reveal" style="margin:22px auto 0; max-width:380px; font-size:15px; line-height:1.65; color:var(--text-secondary);">
      Rahmat! Bir ish kuni ichida ko'rsatilgan raqamga qo'ng'iroq qilamiz.
    </p>

    <div class="reveal flex justify-center gap-3.5 flex-wrap" style="margin-top:38px;">
      <a href="{% url 'core:home' %}" data-mag class="btn-primary" style="padding:17px 30px;">Bosh sahifa →</a>
      <a href="{% url 'courses:list' %}" class="btn-ghost" style="padding:17px 30px;">Kurslarni ko'rish</a>
    </div>
  </div>
</section>
{% endblock %}
