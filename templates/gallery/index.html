{% extends 'base.html' %}
{% load static %}

{% block title %}Galereya — IT Center Yaypan{% endblock %}

{% block content %}

<!-- Header -->
<section class="section-nb-sm" style="border-bottom: 1px solid var(--border);">
  <div class="container-nb">
    <div class="font-mono text-[11px] uppercase tracking-widest mb-6" style="color: var(--accent);">Hayot IT Markazda</div>
    <h1 class="font-display font-black hero-reveal delay-1"
        style="font-size: clamp(2.5rem,7vw,5.5rem); color: var(--text-primary); line-height: 0.95;">
      Galereya
    </h1>
  </div>
</section>

<!-- Gallery -->
<section class="section-nb"
  x-data="{
    open: false,
    current: null,
    currentIdx: 0,
    photos: [{% for photo in photos %}{ id: {{ photo.pk }}, url: '{{ photo.image.url }}', caption: '{{ photo.caption|escapejs }}' }{% if not forloop.last %},{% endif %}{% endfor %}],
    openPhoto(idx) {
      this.currentIdx = idx;
      this.current = this.photos[idx];
      this.open = true;
      document.body.style.overflow = 'hidden';
    },
    closePhoto() {
      this.open = false;
      this.current = null;
      document.body.style.overflow = '';
    },
    prev() {
      this.currentIdx = (this.currentIdx - 1 + this.photos.length) % this.photos.length;
      this.current = this.photos[this.currentIdx];
    },
    next() {
      this.currentIdx = (this.currentIdx + 1) % this.photos.length;
      this.current = this.photos[this.currentIdx];
    }
  }"
  @keydown.escape.window="closePhoto()"
  @keydown.arrowleft.window="open && prev()"
  @keydown.arrowright.window="open && next()">
  <div class="container-nb">
    {% if photos %}

    <!-- Masonry grid -->
    <div class="columns-2 md:columns-3 lg:columns-4 gap-3">
      {% for photo in photos %}
      <div class="break-inside-avoid mb-3 reveal" style="animation-delay: {% cycle '0' '100' '200' '300' %}ms">
        <button @click="openPhoto({{ forloop.index0 }})"
                class="block w-full group relative overflow-hidden transition-all duration-300 focus:outline-none"
                style="border-radius: var(--radius-nb-md); border: 1px solid var(--border);"
                onmouseover="this.style.borderColor='var(--border-bright)'"
                onmouseout="this.style.borderColor='var(--border)'">
          <img src="{{ photo.image.url }}"
               alt="{{ photo.caption|default:'Galereya rasmi' }}"
               loading="lazy"
               class="w-full object-cover transition-transform duration-500 group-hover:scale-105">
          <!-- Caption overlay -->
          {% if photo.caption %}
          <div class="absolute inset-x-0 bottom-0 p-3 opacity-0 group-hover:opacity-100 transition-opacity duration-200"
               style="background: linear-gradient(to top, rgba(10,10,12,0.85), transparent);">
            <p class="text-white text-xs font-medium text-left">{{ photo.caption }}</p>
          </div>
          {% endif %}
          <!-- Zoom icon -->
          <div class="absolute top-2 right-2 w-7 h-7 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-200"
               style="background: rgba(10,10,12,0.7); backdrop-filter: blur(8px);">
            <svg class="w-3.5 h-3.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"/>
            </svg>
          </div>
        </button>
      </div>
      {% endfor %}
    </div>

    <!-- Lightbox -->
    <div x-show="open"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 z-50 flex items-center justify-center p-4"
         style="background: rgba(0,0,0,0.92); backdrop-filter: blur(12px); display:none"
         @click.self="closePhoto()">

      <!-- Close -->
      <button @click="closePhoto()"
              class="absolute top-5 right-5 w-10 h-10 rounded-full flex items-center justify-center transition-all z-10"
              style="background: rgba(255,255,255,0.08);"
              onmouseover="this.style.background='rgba(255,255,255,0.16)'"
              onmouseout="this.style.background='rgba(255,255,255,0.08)'">
        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>

      <!-- Prev -->
      <button @click="prev()"
              x-show="photos.length > 1"
              class="absolute left-4 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full flex items-center justify-center transition-all z-10"
              style="background: rgba(255,255,255,0.08);"
              onmouseover="this.style.background='var(--accent)'"
              onmouseout="this.style.background='rgba(255,255,255,0.08)'">
        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>

      <!-- Image -->
      <div class="max-w-4xl w-full max-h-[90vh] flex flex-col items-center">
        <template x-if="current">
          <div class="flex flex-col items-center w-full">
            <img :src="current.url"
                 :alt="current.caption || 'Galereya rasmi'"
                 class="max-w-full max-h-[80vh] object-contain"
                 style="border-radius: var(--radius-nb-md);">
            <p x-show="current.caption"
               x-text="current.caption"
               class="mt-4 text-sm text-center max-w-md"
               style="color: var(--text-secondary);"></p>
            <p class="mt-2 font-mono text-xs"
               x-text="(currentIdx + 1) + ' / ' + photos.length"
               style="color: var(--text-tertiary);"></p>
          </div>
        </template>
      </div>

      <!-- Next -->
      <button @click="next()"
              x-show="photos.length > 1"
              class="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full flex items-center justify-center transition-all z-10"
              style="background: rgba(255,255,255,0.08);"
              onmouseover="this.style.background='var(--accent)'"
              onmouseout="this.style.background='rgba(255,255,255,0.08)'">
        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
      </button>
    </div>

    {% else %}
    <div class="text-center py-20">
      <div class="text-5xl mb-5">📷</div>
      <p style="color: var(--text-tertiary);">Rasmlar hali qo'shilmagan.</p>
    </div>
    {% endif %}
  </div>
</section>
{% endblock %}
