{% extends 'base.html' %}
{% load static %}

{% block title %}Galereya — IT Center Yaypan{% endblock %}

{% block content %}

<section style="padding:150px 0 110px;"
  x-data="{
    open: false,
    currentIdx: 0,
    photos: [{% for photo in photos %}{ url: '{{ photo.image.url }}', caption: '{{ photo.caption|escapejs }}' }{% if not forloop.last %},{% endif %}{% endfor %}],
    get current() { return this.photos[this.currentIdx] || null; },
    openPhoto(idx) {
      this.currentIdx = idx;
      this.open = true;
      document.body.style.overflow = 'hidden';
    },
    closePhoto() {
      this.open = false;
      document.body.style.overflow = '';
    },
    prev() { this.currentIdx = (this.currentIdx - 1 + this.photos.length) % this.photos.length; },
    next() { this.currentIdx = (this.currentIdx + 1) % this.photos.length; }
  }"
  @keydown.escape.window="closePhoto()"
  @keydown.arrowleft.window="open && prev()"
  @keydown.arrowright.window="open && next()">
  <div class="container-nb">

    <!-- Header -->
    <div class="reveal">
      <div class="eyebrow"><span class="mono-label" style="color:var(--accent);">Hayot IT markazda</span></div>
      <h1 class="display-page" style="margin:14px 0 0;">Galereya</h1>
    </div>

    {% if photos %}
    <!-- Masonry grid -->
    <div class="columns-2 md:columns-3" style="column-gap:16px; margin-top:50px;">
      {% for photo in photos %}
      <button @click="openPhoto({{ forloop.counter0 }})"
              class="reveal block w-full group relative overflow-hidden transition-colors duration-300"
              style="break-inside:avoid; margin:0 0 16px; border:1px solid rgba(255,255,255,0.09); border-radius:16px; padding:0; background:none; cursor:pointer;"
              onmouseover="this.style.borderColor='rgba(43,229,123,0.55)'"
              onmouseout="this.style.borderColor='rgba(255,255,255,0.09)'">
        <img src="{{ photo.image.url }}"
             alt="{{ photo.caption|default:'Galereya rasmi' }}"
             loading="lazy"
             class="w-full object-cover block transition-transform duration-500 group-hover:scale-105">
        {% if photo.caption %}
        <span class="absolute inset-x-0 bottom-0 text-left opacity-0 group-hover:opacity-100 transition-opacity duration-200"
              style="padding:14px; background:linear-gradient(to top, rgba(7,9,8,0.85), transparent);">
          <span class="font-mono" style="font-size:11px; letter-spacing:0.1em; color:rgba(242,244,240,0.85);">{{ photo.caption }}</span>
        </span>
        {% endif %}
        <span class="absolute font-mono" style="top:12px; left:14px; font-size:9px; letter-spacing:0.2em; color:rgba(242,244,240,0.5); text-shadow:0 1px 4px rgba(0,0,0,0.8);">№ {{ forloop.counter|stringformat:"02d" }}</span>
      </button>
      {% endfor %}
    </div>

    <!-- Lightbox -->
    <div x-show="open"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 flex flex-col items-center justify-center"
         style="z-index:100; background:rgba(5,6,5,0.92); backdrop-filter:blur(14px); gap:24px; padding:40px; display:none;"
         @click.self="closePhoto()">

      <template x-if="current">
        <div class="flex flex-col items-center spring-in" style="max-width:min(820px,86vw);">
          <img :src="current.url" :alt="current.caption || 'Galereya rasmi'"
               class="object-contain"
               style="max-width:100%; max-height:64vh; border-radius:20px; border:1px solid rgba(43,229,123,0.3);">
          <p x-show="current.caption" x-text="current.caption"
             class="font-black uppercase text-center"
             style="font-stretch:112%; font-size:22px; color:var(--text-primary); margin-top:18px;"></p>
        </div>
      </template>

      <div class="flex items-center" style="gap:16px;">
        <button @click="prev()" x-show="photos.length > 1"
                class="transition-colors"
                style="width:52px; height:52px; border-radius:50%; background:none; border:1px solid rgba(255,255,255,0.25); color:var(--text-primary); font-size:19px; cursor:pointer;"
                onmouseover="this.style.borderColor='var(--accent)'; this.style.color='var(--accent)'"
                onmouseout="this.style.borderColor='rgba(255,255,255,0.25)'; this.style.color='var(--text-primary)'">←</button>
        <span class="font-mono" style="font-size:12px; letter-spacing:0.22em; color:var(--text-secondary);"
              x-text="(currentIdx + 1) + ' / ' + photos.length"></span>
        <button @click="next()" x-show="photos.length > 1"
                class="transition-colors"
                style="width:52px; height:52px; border-radius:50%; background:none; border:1px solid rgba(255,255,255,0.25); color:var(--text-primary); font-size:19px; cursor:pointer;"
                onmouseover="this.style.borderColor='var(--accent)'; this.style.color='var(--accent)'"
                onmouseout="this.style.borderColor='rgba(255,255,255,0.25)'; this.style.color='var(--text-primary)'">→</button>
        <button @click="closePhoto()"
                class="transition-shadow"
                style="width:52px; height:52px; border-radius:50%; background:var(--accent); border:none; color:var(--bg-base); font-size:18px; font-weight:800; cursor:pointer; margin-left:14px;"
                onmouseover="this.style.boxShadow='0 0 0 3px rgba(43,229,123,0.35)'"
                onmouseout="this.style.boxShadow=''">✕</button>
      </div>
    </div>

    {% else %}
    <div class="text-center py-20">
      <div class="font-mono" style="font-size:13px; letter-spacing:0.2em; color:rgba(43,229,123,0.6); text-transform:uppercase;">[ foto ]</div>
      <p style="color:var(--text-tertiary); margin-top:14px;">Rasmlar hali qo'shilmagan.</p>
    </div>
    {% endif %}
  </div>
</section>

{% endblock %}
