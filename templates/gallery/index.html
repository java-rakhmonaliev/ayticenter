{% extends 'base.html' %}
{% load static %}

{% block title %}Galereya — IT Center Yaypan{% endblock %}

{% block content %}
<section class="section border-b border-border">
  <div class="container-main">
    <div class="text-xs font-semibold text-muted uppercase tracking-widest mb-4">Hayot IT Markazda</div>
    <h1 class="text-[clamp(2rem,5vw,3.5rem)] font-extrabold text-base-dark tracking-tight leading-tight">
      Galereya
    </h1>
  </div>
</section>

<section class="section"
  x-data="{
    open: false,
    current: null,
    currentIdx: 0,
    photos: [{% for photo in photos %}{ id: {{ photo.pk }}, url: '{{ photo.image.url }}', caption: '{{ photo.caption|escapejs }}' }{% if not forloop.last %},{% endif %}{% endfor %}],
    openPhoto(idx) {
      this.currentIdx = idx;
      this.current = this.photos[idx];
      this.open = true;
      document.body.style.overflow = 'hidden';
    },
    closePhoto() {
      this.open = false;
      this.current = null;
      document.body.style.overflow = '';
    },
    prev() {
      this.currentIdx = (this.currentIdx - 1 + this.photos.length) % this.photos.length;
      this.current = this.photos[this.currentIdx];
    },
    next() {
      this.currentIdx = (this.currentIdx + 1) % this.photos.length;
      this.current = this.photos[this.currentIdx];
    }
  }"
  @keydown.escape.window="closePhoto()"
  @keydown.arrowleft.window="open && prev()"
  @keydown.arrowright.window="open && next()"
>
  <div class="container-main">
    {% if photos %}

    <!-- Masonry grid -->
    <div class="columns-2 md:columns-3 lg:columns-4 gap-3 space-y-0">
      {% for photo in photos %}
      <div class="break-inside-avoid mb-3">
        <button
          @click="openPhoto({{ forloop.index0 }})"
          class="block w-full group relative overflow-hidden rounded-card border border-border hover:border-border-dark transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-accent focus:ring-offset-2"
        >
          <img
            src="{{ photo.image.url }}"
            alt="{{ photo.caption|default:'Galereya rasmi' }}"
            loading="lazy"
            class="w-full object-cover transition-transform duration-500 group-hover:scale-105"
          >
          {% if photo.caption %}
          <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/60 to-transparent p-3 opacity-0 group-hover:opacity-100 transition-opacity duration-200">
            <p class="text-white text-xs font-medium text-left">{{ photo.caption }}</p>
          </div>
          {% endif %}
        </button>
      </div>
      {% endfor %}
    </div>

    <!-- Lightbox -->
    <div
      x-show="open"
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0"
      x-transition:enter-end="opacity-100"
      x-transition:leave="transition ease-in duration-150"
      x-transition:leave-start="opacity-100"
      x-transition:leave-end="opacity-0"
      class="fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-4"
      @click.self="closePhoto()"
      style="display: none"
    >
      <!-- Close -->
      <button
        @click="closePhoto()"
        class="absolute top-4 right-4 w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center text-white transition-colors z-10"
        aria-label="Yopish"
      >
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>

      <!-- Prev -->
      <button
        @click="prev()"
        class="absolute left-4 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center text-white transition-colors z-10"
        aria-label="Oldingi"
        x-show="photos.length > 1"
      >
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>

      <!-- Image -->
      <div class="max-w-4xl max-h-[90vh] flex flex-col items-center">
        <template x-if="current">
          <div class="flex flex-col items-center">
            <img
              :src="current.url"
              :alt="current.caption || 'Galereya rasmi'"
              class="max-w-full max-h-[80vh] object-contain rounded-lg"
            >
            <p x-show="current.caption" x-text="current.caption" class="mt-4 text-white/70 text-sm text-center max-w-md"></p>
            <p class="mt-2 text-white/30 text-xs" x-text="(currentIdx + 1) + ' / ' + photos.length"></p>
          </div>
        </template>
      </div>

      <!-- Next -->
      <button
        @click="next()"
        class="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center text-white transition-colors z-10"
        aria-label="Keyingi"
        x-show="photos.length > 1"
      >
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
      </button>
    </div>

    {% else %}
    <div class="text-center py-16">
      <div class="text-4xl mb-4">📷</div>
      <p class="text-muted">Rasmlar hali qo'shilmagan.</p>
    </div>
    {% endif %}
  </div>
</section>
{% endblock %}
