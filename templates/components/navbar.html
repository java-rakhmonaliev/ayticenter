{% load static %}
<header id="navbar" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300" x-data="{ open: false }">
  <div class="container-nb">
    <nav class="flex items-center justify-between h-16">

      <!-- Logo -->
      <a href="{% url 'core:home' %}" class="flex items-center gap-3 group">
        <div class="relative w-9 h-9 flex-shrink-0">
          <div class="absolute inset-0 rounded-nb-sm flex items-center justify-center"
               style="background: var(--accent); box-shadow: 0 0 20px rgba(255,92,26,0.4);">
            <span class="font-display font-black text-white text-sm leading-none">IT</span>
          </div>
        </div>
        <div class="leading-tight">
          <div class="font-display font-bold text-sm" style="color: var(--text-primary);">IT Center</div>
          <div class="font-mono text-[10px] uppercase tracking-widest" style="color: var(--text-tertiary);">Yaypan</div>
        </div>
      </a>

      <!-- Desktop nav -->
      <div class="hidden md:flex items-center gap-8">
        <a href="{% url 'courses:list' %}" class="nav-link-nb">Kurslar</a>
        <a href="{% url 'teachers:list' %}" class="nav-link-nb">Jamoa</a>
        <a href="{% url 'career:index' %}" class="nav-link-nb">Karyera</a>
        <a href="{% url 'news:list' %}" class="nav-link-nb">Yangiliklar</a>
        <a href="{% url 'gallery:index' %}" class="nav-link-nb">Galereya</a>
        <a href="{% url 'core:about' %}" class="nav-link-nb">Haqida</a>
      </div>

      <!-- CTA + mobile -->
      <div class="flex items-center gap-3">
        <a href="{% url 'admissions:apply' %}" class="hidden md:inline-flex btn-primary text-xs px-5 py-2.5">
          Ariza →
        </a>

        <!-- Hamburger -->
        <button @click="open = !open"
                class="md:hidden p-2 rounded-nb-sm transition-colors"
                style="color: var(--text-secondary);"
                aria-label="Menyu">
          <svg x-show="!open" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
          <svg x-show="open" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" style="display:none">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </nav>
  </div>

  <!-- Mobile menu -->
  <div x-show="open"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 -translate-y-2"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100 translate-y-0"
       x-transition:leave-end="opacity-0 -translate-y-2"
       class="md:hidden"
       style="background: rgba(10,10,12,0.97); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);"
       style="display:none">
    <div class="container-nb py-5 flex flex-col gap-1">
      <a href="{% url 'courses:list' %}"  @click="open=false" class="px-3 py-3 text-sm font-medium rounded-nb-sm transition-colors" style="color:var(--text-secondary);" onmouseover="this.style.color='var(--text-primary)'; this.style.background='var(--bg-elevated)'" onmouseout="this.style.color='var(--text-secondary)'; this.style.background=''">Kurslar</a>
      <a href="{% url 'teachers:list' %}" @click="open=false" class="px-3 py-3 text-sm font-medium rounded-nb-sm transition-colors" style="color:var(--text-secondary);" onmouseover="this.style.color='var(--text-primary)'; this.style.background='var(--bg-elevated)'" onmouseout="this.style.color='var(--text-secondary)'; this.style.background=''">Jamoa</a>
      <a href="{% url 'career:index' %}"  @click="open=false" class="px-3 py-3 text-sm font-medium rounded-nb-sm transition-colors" style="color:var(--text-secondary);" onmouseover="this.style.color='var(--text-primary)'; this.style.background='var(--bg-elevated)'" onmouseout="this.style.color='var(--text-secondary)'; this.style.background=''">Karyera</a>
      <a href="{% url 'news:list' %}"     @click="open=false" class="px-3 py-3 text-sm font-medium rounded-nb-sm transition-colors" style="color:var(--text-secondary);" onmouseover="this.style.color='var(--text-primary)'; this.style.background='var(--bg-elevated)'" onmouseout="this.style.color='var(--text-secondary)'; this.style.background=''">Yangiliklar</a>
      <a href="{% url 'gallery:index' %}" @click="open=false" class="px-3 py-3 text-sm font-medium rounded-nb-sm transition-colors" style="color:var(--text-secondary);" onmouseover="this.style.color='var(--text-primary)'; this.style.background='var(--bg-elevated)'" onmouseout="this.style.color='var(--text-secondary)'; this.style.background=''">Galereya</a>
      <a href="{% url 'core:about' %}"    @click="open=false" class="px-3 py-3 text-sm font-medium rounded-nb-sm transition-colors" style="color:var(--text-secondary);" onmouseover="this.style.color='var(--text-primary)'; this.style.background='var(--bg-elevated)'" onmouseout="this.style.color='var(--text-secondary)'; this.style.background=''">Haqida</a>
      <div class="pt-3 border-t mt-1" style="border-color: var(--border);">
        <a href="{% url 'admissions:apply' %}" class="btn-primary w-full justify-center">Ariza topshirish →</a>
      </div>
    </div>
  </div>
</header>

<!-- Navbar spacer -->
<div class="h-16"></div>
