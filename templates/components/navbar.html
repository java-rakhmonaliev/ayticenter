{% load static %}
<header id="navbar" class="fixed left-0 right-0 z-50" style="top:3px;" x-data="{ open: false }">
  <nav class="flex items-center justify-between gap-4 px-5 md:px-8"
       style="padding-top:14px; padding-bottom:14px; background:rgba(7,9,8,0.82); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-bottom:1px solid rgba(255,255,255,0.08);">

    <!-- Logo -->
    <a href="{% url 'core:home' %}" class="flex items-center gap-3 flex-shrink-0">
      <img src="{% static 'imgs/logo-mark.png' %}" alt="IT Center" style="height:38px; width:auto; display:block;">
      <span class="block leading-none">
        <span class="block font-black uppercase" style="font-stretch:115%; font-size:15px; letter-spacing:0.02em; color:var(--text-primary);">IT Center</span>
        <span class="block font-mono" style="font-size:8.5px; letter-spacing:0.3em; color:var(--accent); margin-top:3px;">YAYPAN · IT PARK</span>
      </span>
    </a>

    <!-- Desktop nav -->
    <div class="hidden lg:flex items-center gap-1">
      <a href="{% url 'courses:list' %}" class="nav-link-nb">Kurslar</a>
      <a href="{% url 'teachers:list' %}" class="nav-link-nb">Jamoa</a>
      <a href="{% url 'career:index' %}" class="nav-link-nb">Karyera</a>
      <a href="{% url 'news:list' %}" class="nav-link-nb">Yangiliklar</a>
      <a href="{% url 'gallery:index' %}" class="nav-link-nb">Galereya</a>
      <a href="{% url 'core:about' %}" class="nav-link-nb">Haqida</a>
    </div>

    <!-- CTA + mobile toggle -->
    <div class="flex items-center gap-3">
      <a href="{% url 'admissions:apply' %}" data-mag
         class="hidden lg:inline-flex btn-primary"
         style="font-size:13px; padding:12px 22px; border-radius:11px;">
        Ariza <span style="font-size:15px;">→</span>
      </a>

      <!-- Hamburger -->
      <button @click="open = !open"
              class="lg:hidden p-2 rounded-lg transition-colors"
              style="color:var(--text-secondary); background:none; border:none; cursor:pointer;"
              aria-label="Menyu">
        <svg x-show="!open" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
        <svg x-show="open" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" style="display:none">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- Mobile menu -->
  <div x-show="open"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 -translate-y-2"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100 translate-y-0"
       x-transition:leave-end="opacity-0 -translate-y-2"
       class="lg:hidden"
       style="background:rgba(7,9,8,0.97); backdrop-filter:blur(16px); border-bottom:1px solid rgba(255,255,255,0.08); display:none;">
    <div class="px-5 py-5 flex flex-col gap-1">
      <a href="{% url 'courses:list' %}"  @click="open=false" class="nav-link-nb py-3">Kurslar</a>
      <a href="{% url 'teachers:list' %}" @click="open=false" class="nav-link-nb py-3">Jamoa</a>
      <a href="{% url 'career:index' %}"  @click="open=false" class="nav-link-nb py-3">Karyera</a>
      <a href="{% url 'news:list' %}"     @click="open=false" class="nav-link-nb py-3">Yangiliklar</a>
      <a href="{% url 'gallery:index' %}" @click="open=false" class="nav-link-nb py-3">Galereya</a>
      <a href="{% url 'core:about' %}"    @click="open=false" class="nav-link-nb py-3">Haqida</a>
      <div class="pt-3 mt-1" style="border-top:1px solid var(--border);">
        <a href="{% url 'admissions:apply' %}" class="btn-primary w-full justify-center">Ariza topshirish →</a>
      </div>
    </div>
  </div>
</header>
