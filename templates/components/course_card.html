{% load static %}
<a href="{{ course.get_absolute_url }}" class="card group flex flex-col">
  <!-- Image or emoji header -->
  <div class="aspect-[16/9] bg-base-dark/5 relative overflow-hidden">
    {% if course.cover_image %}
      <img
        src="{{ course.cover_image.url }}"
        alt="{{ course.name }}"
        class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
      >
    {% else %}
      <div class="w-full h-full flex items-center justify-center bg-surface">
        <span class="text-5xl select-none">{{ course.icon_emoji }}</span>
      </div>
    {% endif %}
    <!-- Level badge -->
    <div class="absolute top-3 left-3">
      <span class="badge-{{ course.level }} text-[11px]">{{ course.level_display }}</span>
    </div>
  </div>

  <!-- Content -->
  <div class="p-5 flex flex-col flex-1">
    <h3 class="font-bold text-base-dark text-base leading-snug mb-1.5 group-hover:text-accent transition-colors">
      {{ course.name }}
    </h3>
    <p class="text-sm text-muted leading-relaxed flex-1 mb-4">{{ course.tagline }}</p>

    <div class="flex items-center justify-between gap-3 pt-4 border-t border-border">
      <div class="flex items-center gap-1 text-xs text-muted">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        {{ course.duration }}
      </div>
      <span class="text-sm font-semibold text-base-dark">{{ course.price }}</span>
    </div>
  </div>
</a>
