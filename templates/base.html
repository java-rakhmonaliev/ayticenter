<!DOCTYPE html>
<html lang="uz" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% block meta_description %}IT Center Yaypan — Farg'ona viloyatida zamonaviy IT ta'lim. Dasturlash, dizayn va kompyuter kurslari.{% endblock %}">
  <title>{% block title %}IT Center Yaypan{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  {% load static %}
  <link rel="icon" type="image/png" href="{% static 'imgs/logo-mark.png' %}">
  <link rel="stylesheet" href="{% static 'css/main.css' %}?v=green-1">

  <style>
    /* Page transition */
    body { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body style="background:#070908; color:#F2F4F0;" x-data>

  <!-- Scroll progress bar -->
  <div data-progress style="position:fixed;top:0;left:0;height:3px;width:0%;background:#2BE57B;z-index:99;box-shadow:0 0 12px rgba(43,229,123,0.8)"></div>

  {% include 'components/navbar.html' %}

  <main>
    {% block content %}{% endblock %}
  </main>

  {% include 'components/footer.html' %}

  <!-- Alpine.js -->
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <!-- Main JS -->
  <script src="{% static 'js/main.js' %}?v=green-1" defer></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
