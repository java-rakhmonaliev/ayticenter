<!DOCTYPE html>
<html lang="uz" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% block meta_description %}IT Center Yaypan — Farg'ona viloyatida zamonaviy IT ta'lim. Dasturlash, dizayn va kompyuter kurslari.{% endblock %}">
  <title>{% block title %}IT Center Yaypan{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}">

  <style>
    /* Critical inline — nav scrolled state */
    #navbar.scrolled {
      background: rgba(10,10,12,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    /* Page transition */
    body { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body style="background:#0A0A0C; color:#F0EFE8;" x-data>

  {% include 'components/navbar.html' %}

  <main>
    {% block content %}{% endblock %}
  </main>

  {% include 'components/footer.html' %}

  <!-- Alpine.js -->
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <!-- Main JS -->
  <script src="{% static 'js/main.js' %}" defer></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
